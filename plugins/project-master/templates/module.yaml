# Module sidecar metadata

# Identity
id: {{module_prefix}}
type: module
title: {{module_name}}

# Ownership and status
owner: {{owner}}
status: backlog                                     # backlog | in-progress | done | deprecated

# Children
epics: []                                           # auto-populated

# Jira sync
